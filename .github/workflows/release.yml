name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/easy-eo
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # skip (don't fail) if this version was
          # already uploaded, e.g. a re-run or an accidental duplicate tag.
          skip-existing: true

  docs:
    name: Trigger Read the Docs build
    needs: publish
    runs-on: ubuntu-latest
    # Trigger build only for real version tags
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: Trigger Read the Docs build
        run: >
          curl --fail --silent --show-error -X POST
          --data "token=${{ secrets.READTHEDOCS_WEBHOOK_TOKEN }}"
          --data "branches=${{ github.ref_name }}"
          "${{ secrets.READTHEDOCS_WEBHOOK_URL }}"
