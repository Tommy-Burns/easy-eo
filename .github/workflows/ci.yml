name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install locked environment
        run: uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check eeo tests

      - name: Ruff format check
        run: uv run ruff format --check eeo tests

      - name: mypy
        run: uv run mypy

      # Section/signature consistency on the public operation API, per
      # [tool.numpydoc_validation]. Run ephemerally so numpydoc's sphinx
      # dependency stays out of the locked dev environment.
      - name: Validate docstrings (numpydoc)
        run: >
          uvx --from numpydoc numpydoc lint
          eeo/ops/*.py eeo/analysis/*.py eeo/preprocessing/*.py eeo/viz/*.py
          eeo/core/loader.py eeo/_show_versions.py

      - name: Core stub freshness
        run: uv run python scripts/generate_core_stub.py --check

  test:
    name: Test (py${{ matrix.python-version }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install locked environment
        run: uv sync --frozen --extra dev

      - name: Run tests with coverage
        run: uv run pytest --cov-report=xml

      # Upload coverage once, from a single representative job, to avoid
      # redundant reports across the full matrix.
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  min-versions:
    name: Minimum supported versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.10"

      # Resolve the lowest versions of the direct dependencies (per their
      # pyproject lower bounds) to prove the declared floor actually works.
      # `uv pip` resolves for this interpreter specifically — unlike the
      # universal `uv sync` — so it can pick e.g. numpy 1.26, which has no
      # wheels for the newest Python. The lockfile is deliberately ignored.
      - name: Install lowest supported dependency versions
        run: |
          uv venv --python 3.10 --clear
          uv pip install --resolution lowest-direct -e ".[dev]"

      # Old dependency versions legitimately emit their own deprecation
      # warnings (e.g. matplotlib via pyparsing); this job checks functional
      # compatibility, so deprecation warnings are not treated as failures.
      - name: Run tests
        run: uv run --no-sync pytest -W ignore::DeprecationWarning
