name: Feature request
description: Suggest a new capability, operation, or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping shape Easy-EO! Please describe the problem you are
        trying to solve, not only the solution you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: >-
        What EO workflow are you trying to accomplish, and where does Easy-EO
        fall short today?
      placeholder: |
        I want to compute NDMI across a folder of Sentinel-2 scenes, but there
        is no helper for it and doing it by hand is error-prone.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >-
        The API you would like to see. A sketch of the call and expected result
        helps a lot.
      render: python
      placeholder: |
        result = ds.ndmi()  # chainable, float32, nodata-safe
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or existing tools you have tried.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Which area does this touch?
      multiple: true
      options:
        - Core / dataset API
        - Algebra & ops
        - Preprocessing (clip, resample, reproject, normalize)
        - Analysis (indices, stats)
        - Visualization
        - Data access (STAC / sample data / xarray)
        - Docs / examples
        - Other
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions and this is not a duplicate.
          required: true
